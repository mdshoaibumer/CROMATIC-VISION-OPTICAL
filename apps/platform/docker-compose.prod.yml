# ==============================================================================
# Cromatic Vision Optical - Production Docker Compose Stack
# Services: Go API backend, PostgreSQL, Redis, Nginx reverse proxy
# Health checks enabled on all critical services for zero-downtime deploys
# ==============================================================================
version: '3.8'

services:
  # Go Fiber Backend (E-commerce API)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cromatic_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - APP_ENV=production
      - APP_PORT=8080
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${DB_USER:?DB_USER must be set}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - POSTGRES_DB=${DB_NAME:?DB_NAME must be set}
      - POSTGRES_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ALLOWED_ORIGINS=https://cromaticvision.com,https://www.cromaticvision.com
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - STORAGE_PROVIDER=s3
      - S3_ENDPOINT=${R2_ENDPOINT}
      - S3_ACCESS_KEY_ID=${R2_ACCESS_KEY}
      - S3_SECRET_ACCESS_KEY=${R2_SECRET_KEY}
      - S3_BUCKET=${R2_BUCKET}
      - S3_REGION=${R2_REGION:-auto}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cromatic_network

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: cromatic_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432" # only loopback exposed
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cromatic_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cromatic_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cromatic_network

  # Nginx Reverse Proxy & SSL
  nginx:
    image: nginx:alpine
    container_name: cromatic_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - cromatic_network

  # Certbot for SSL renewal
  certbot:
    image: certbot/certbot
    container_name: cromatic_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redisdata:

networks:
  cromatic_network:
    driver: bridge
