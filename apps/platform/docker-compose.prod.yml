version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: cromatic_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.cromaticvision.com
      - NEXT_PUBLIC_RAZORPAY_KEY=${RAZORPAY_KEY_ID}
    depends_on:
      - backend
    networks:
      - cromatic_network

  # Go Fiber Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: cromatic_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_URL=redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - S3_ENDPOINT=${R2_ENDPOINT}
      - S3_ACCESS_KEY=${R2_ACCESS_KEY}
      - S3_SECRET_KEY=${R2_SECRET_KEY}
      - S3_BUCKET=${R2_BUCKET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cromatic_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cromatic_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432" # only loopback exposed
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cromatic_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cromatic_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    networks:
      - cromatic_network

  # Nginx Reverse Proxy & SSL (Optionally replace with Traefik)
  nginx:
    image: nginx:alpine
    container_name: cromatic_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - cromatic_network

  # Certbot for SSL renewal
  certbot:
    image: certbot/certbot
    container_name: cromatic_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redisdata:

networks:
  cromatic_network:
    driver: bridge
