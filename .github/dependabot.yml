version: 2
updates:
  # Go backend dependencies
  - package-ecosystem: gomod
    directory: /apps/platform
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - cromatic-vision/backend
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "deps(go):"

  # Platform frontend (npm)
  - package-ecosystem: npm
    directory: /apps/platform
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - cromatic-vision/frontend
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "deps(platform):"
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      dev-dependencies:
        dependency-type: development

  # Web frontend (npm)
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - cromatic-vision/frontend
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "deps(web):"
    groups:
      next:
        patterns:
          - "next*"
          - "@next/*"
      react:
        patterns:
          - "react*"
          - "@types/react*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci:"
